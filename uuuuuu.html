<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Sakura Dreams</title>

<style>
body{
    background: linear-gradient(to bottom, #ffd6e7, #fff);
    overflow-x: hidden;
}

/* SAKURA */
.petal {
  position: fixed;
  top: -20px;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
  z-index: 9999;
}
@keyframes fall {
  0% { transform: translateY(-50px); }
  100% { transform: translateY(100vh) translateX(80px); }
}

/* CARD */
.card:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

/* ORDER BOX */
#orderBox{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.price{
    color:#e91e63;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- SAKURA SCRIPT -->
<script>
setInterval(()=>{
 let p=document.createElement("div");
 p.className="petal";
 p.style.left=Math.random()*window.innerWidth+"px";
 p.style.animationDuration=(4+Math.random()*5)+"s";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),8000);
},200);
</script>

<div class="container text-center mt-4">

<h1>🌸 Sakura Dreams Book Cafe</h1>
<p>Relax • Read • Dream</p>

<!-- MENU -->
<div class="row mt-4">

<div class="col-md-4">
<div class="card shadow h-100">
<div class="card-body">
<h5>📚 Kitoblar</h5>
<p>Detektiv - <span class="price">$8</span></p>
<p>Romantik - <span class="price">$7</span></p>
<p>Biznes - <span class="price">$9</span></p>
<p>Fantastika - <span class="price">$10</span></p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow h-100">
<div class="card-body">
<h5>☕ Ichimliklar</h5>
<p>Coffee - <span class="price">$3</span></p>
<p>Tea - <span class="price">$2.5</span></p>
<p>Latte - <span class="price">$4.5</span></p>
<p>Juice - <span class="price">$3.5</span></p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow h-100">
<div class="card-body">
<h5>🍰 Shirinliklar</h5>
<p>Cake - <span class="price">$6</span></p>
<p>Ice Cream - <span class="price">$5</span></p>
<p>Cheesecake - <span class="price">$7.5</span></p>
<p>Chocolate - <span class="price">$4</span></p>
</div>
</div>
</div>

</div>

<!-- ORDER -->
<div id="orderBox" class="mt-5">

<div class="row">

<div class="col-md-4">
<select id="book" class="form-select">
<option value="">📚 Kitob tanlang</option>
<option value="8">Detektiv</option>
<option value="7">Romantik</option>
<option value="9">Biznes</option>
<option value="10">Fantastika</option>
</select>
</div>

<div class="col-md-4">
<select id="drink" class="form-select">
<option value="">☕ Ichimlik tanlang</option>
<option value="3">Coffee</option>
<option value="2.5">Tea</option>
<option value="4.5">Latte</option>
<option value="3.5">Juice</option>
</select>
</div>

<div class="col-md-4">
<select id="dessert" class="form-select">
<option value="">🍰 Shirinlik tanlang</option>
<option value="6">Cake</option>
<option value="5">Ice Cream</option>
<option value="7.5">Cheesecake</option>
<option value="4">Chocolate</option>
</select>
</div>

</div>

<button class="btn btn-success mt-4 w-100" onclick="orderNow()">
🤖 Buyurtma berish
</button>

 <div id="result" class="mt-3 fw-bold"></div>

  <br>

  <a href="index.html" class="btn btn-secondary">⬅ Orqaga</a>

</div>

</div>

<script>
function orderNow() {

let b=document.getElementById("book").value;
let d=document.getElementById("drink").value;
let s=document.getElementById("dessert").value;
let res=document.getElementById("result");

if(!b||!d||!s){
 res.style.color="red";
 res.innerHTML="❌ Hammasini tanlang!";
 return;
}

let total=parseFloat(b)+parseFloat(d)+parseFloat(s);

res.style.color="green";
res.innerHTML=
"✅ Buyurtma qabul qilindi!<br>"+
"💰 Jami: $"+total;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
